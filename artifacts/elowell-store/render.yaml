services:
  - type: web
    name: elowell-store
    env: static
    buildCommand: npm run build
    staticPublishPath: ./dist
    headers:
      - source: "/*"
        headers:
          - key: "X-Frame-Options"
            value: "DENY"
          - key: "X-Content-Type-Options"
            value: "nosniff"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"